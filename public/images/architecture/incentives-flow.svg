<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2937" />
    </marker>
  </defs>

  <text x="550" y="28" text-anchor="middle" font-size="16" fill="#111827" font-family="Arial, sans-serif">
    Incentives Flow: Service Fees + TNT Budgets
  </text>

  <!-- Service fee lane -->
  <rect x="30" y="60" width="220" height="60" rx="10" fill="#eef6ff" stroke="#1f2937" stroke-width="2" />
  <text x="140" y="94" text-anchor="middle" font-size="13" fill="#111827" font-family="Arial, sans-serif">Service Fees</text>
  <text x="140" y="112" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Customer payments</text>

  <rect x="280" y="50" width="200" height="80" rx="10" fill="#fff7ed" stroke="#1f2937" stroke-width="2" />
  <text x="380" y="88" text-anchor="middle" font-size="13" fill="#111827" font-family="Arial, sans-serif">Payments.sol</text>
  <text x="380" y="106" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Fee split</text>

  <line x1="250" y1="90" x2="280" y2="90" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Fee split outputs -->
  <rect x="520" y="40" width="140" height="56" rx="8" fill="#ecfdf5" stroke="#1f2937" stroke-width="2" />
  <text x="590" y="73" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Developer</text>

  <rect x="520" y="110" width="140" height="56" rx="8" fill="#ecfdf5" stroke="#1f2937" stroke-width="2" />
  <text x="590" y="143" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Protocol Treasury</text>

  <rect x="520" y="180" width="140" height="56" rx="8" fill="#ecfdf5" stroke="#1f2937" stroke-width="2" />
  <text x="590" y="213" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Operators</text>

  <rect x="520" y="250" width="140" height="56" rx="8" fill="#ecfdf5" stroke="#1f2937" stroke-width="2" />
  <text x="590" y="283" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Stakers</text>

  <line x1="480" y1="80" x2="520" y2="68" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="480" y1="90" x2="520" y2="138" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="480" y1="100" x2="520" y2="208" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="480" y1="110" x2="520" y2="278" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ServiceFeeDistributor -->
  <rect x="720" y="250" width="210" height="56" rx="8" fill="#fef3c7" stroke="#1f2937" stroke-width="2" />
  <text x="825" y="283" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">ServiceFeeDistributor</text>
  <line x1="660" y1="278" x2="720" y2="278" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <text x="690" y="266" text-anchor="middle" font-size="10" fill="#111827" font-family="Arial, sans-serif">Staker share</text>

  <rect x="960" y="250" width="120" height="56" rx="8" fill="#eef6ff" stroke="#1f2937" stroke-width="2" />
  <text x="1020" y="283" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Delegators</text>
  <line x1="930" y1="278" x2="960" y2="278" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />

  <!-- TNT incentive lane -->
  <rect x="30" y="190" width="220" height="60" rx="10" fill="#f3e8ff" stroke="#1f2937" stroke-width="2" />
  <text x="140" y="224" text-anchor="middle" font-size="13" fill="#111827" font-family="Arial, sans-serif">TNT Budgets</text>
  <text x="140" y="242" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Governance-funded</text>

  <rect x="280" y="180" width="200" height="80" rx="10" fill="#ede9fe" stroke="#1f2937" stroke-width="2" />
  <text x="380" y="218" text-anchor="middle" font-size="13" fill="#111827" font-family="Arial, sans-serif">InflationPool</text>
  <text x="380" y="236" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Epoch distribution</text>

  <line x1="250" y1="220" x2="280" y2="220" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="520" y="320" width="170" height="56" rx="8" fill="#f0f9ff" stroke="#1f2937" stroke-width="2" />
  <text x="605" y="353" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">RewardVaults</text>
  <text x="605" y="369" text-anchor="middle" font-size="10" fill="#111827" font-family="Arial, sans-serif">TNT staker incentives</text>

  <rect x="720" y="320" width="230" height="56" rx="8" fill="#f0fdf4" stroke="#1f2937" stroke-width="2" />
  <text x="835" y="352" text-anchor="middle" font-size="11" fill="#111827" font-family="Arial, sans-serif">Operator / Customer / Developer</text>
  <text x="835" y="368" text-anchor="middle" font-size="10" fill="#111827" font-family="Arial, sans-serif">Pending TNT balances</text>

  <line x1="480" y1="220" x2="520" y2="348" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="480" y1="220" x2="720" y2="348" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Optional staker exposure route -->
  <line x1="480" y1="220" x2="720" y2="278" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4 4" />
  <text x="650" y="220" text-anchor="middle" font-size="10" fill="#111827" font-family="Arial, sans-serif">Optional staker exposure</text>

  <line x1="690" y1="348" x2="960" y2="278" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)" />
  <text x="820" y="312" text-anchor="middle" font-size="10" fill="#111827" font-family="Arial, sans-serif">TNT claims</text>
</svg>
