[build]
    command = "next build"
    publish = "dist"

[[redirects]]
from = "/restake"
to = "/restake/introduction"
status = 301

[[redirects]]
from = "/developers"
to = "/developers/blueprints/introduction"
status = 301

[[redirects]]
from = "/operators"
to = "/operators/introduction"
