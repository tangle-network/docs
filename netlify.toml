[build]
    command = "next build"
    publish = "dist"

[[redirects]]
from = "/restake"
to = "/restake/introduction"
status = 301

[[redirects]]
from = "/developers"
to = "/developers/blueprints/introduction"
status = 301

[[redirects]]
from = "/operators"
to = "/operators/introduction"
status = 301

# The Blueprint Agent section was previously routed at /vibe, then briefly /workbench.
# Keep both old paths alive.
[[redirects]]
from = "/vibe/*"
to = "/blueprint-agent/:splat"
status = 301

[[redirects]]
from = "/vibe"
to = "/blueprint-agent/introduction"
status = 301

[[redirects]]
from = "/workbench/*"
to = "/blueprint-agent/:splat"
status = 301

[[redirects]]
from = "/workbench"
to = "/blueprint-agent/introduction"
status = 301